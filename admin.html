<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P9 IMPORTS — Admin</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{background:#050505;color:#fff;font-family:sans-serif}
#admin-screen{display:none}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>Login</h2>
  <input id="l-user" placeholder="user"><br><br>
  <input id="l-pass" type="password" placeholder="pass"><br><br>
  <button onclick="doLogin()">Entrar</button>
  <p id="l-err" style="color:red;display:none">Erro</p>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <h2>Painel</h2>
  <button onclick="doLogout()">Sair</button>

  <hr>

  <input id="f-name" placeholder="Nome"><br><br>
  <input id="f-price" placeholder="Preço"><br><br>

  <button onclick="saveProduct()">Salvar</button>

  <hr>

  <div id="product-list"></div>
</div>

<script>
/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "p9importa.firebaseapp.com",
  projectId: "p9importa"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* LOGIN */
const ADMIN_USER = "admin";
const ADMIN_PASS = "p9imports2025";

function doLogin(){
  const u = document.getElementById("l-user").value;
  const p = document.getElementById("l-pass").value;

  if(u === ADMIN_USER && p === ADMIN_PASS){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("admin-screen").style.display="block";
    loadProducts();
  }else{
    document.getElementById("l-err").style.display="block";
  }
}

function doLogout(){
  location.reload();
}

/* PRODUTOS */
let products = [];

function loadProducts(){
  db.collection("produtos").onSnapshot(snap=>{
    products = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}

function render(){
  const el = document.getElementById("product-list");
  el.innerHTML = products.map(p=>`
    <div>
      ${p.name} - ${p.price}
    </div>
  `).join("");
}

async function saveProduct(){
  const name = document.getElementById("f-name").value;
  const price = document.getElementById("f-price").value;

  if(!name || !price){
    alert("preencha tudo");
    return;
  }

  const id = Date.now().toString();

  await db.collection("produtos").doc(id).set({
    name,
    price
  });

  document.getElementById("f-name").value="";
  document.getElementById("f-price").value="";
}

/* CORREÇÃO DO ERRO PRINCIPAL */
let galleryImgs = [];

function setMainImg(index){
  const [main] = galleryImgs.splice(index,1);
  galleryImgs.unshift(main);
}
</script>

</body>
</html>
