/* ── LOGIN ── */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-box {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 3rem 2.5rem;
  width: 100%; max-width: 400px;
  text-align: center;
  animation: fadeUp .5s ease;
}
.login-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem; font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: .3rem;
}
.login-logo span { color: var(--white); }
.login-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem; letter-spacing: 0.25em;
  text-transform: uppercase; color: var(--gray);
  margin-bottom: 2.5rem;
}
.login-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gray2);
  display: block; text-align: left; margin-bottom: .5rem;
}
.login-input {
  width: 100%; padding: 12px 16px;
  background: var(--card2); border: 1px solid var(--border);
  color: var(--white); font-family: 'Barlow', sans-serif;
  font-size: 0.9rem; outline: none;
  transition: border-color .2s;
  margin-bottom: 1.2rem;
}
.login-input:focus { border-color: var(--gold); }
.login-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--black); font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem; letter-spacing: 0.22em;
  text-transform: uppercase; font-weight: 700;
  border: none; cursor: pointer;
  transition: opacity .2s;
}
.login-btn:hover { opacity: .88; }
.login-err {
  font-size: 0.78rem; color: #e74c3c;
  margin-top: 1rem; display: none;
}

/* ── ADMIN LAYOUT ── */
#admin-screen { display: none; min-height: 100vh; }

.admin-nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 60px;
  background: rgba(5,5,5,0.95);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
}
.admin-nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem; font-weight: 700;
  letter-spacing: 0.2em; color: var(--gold);
  text-transform: uppercase;
}
.admin-nav-logo span { color: var(--white); }
.admin-nav-right {
  display: flex; align-items: center; gap: 1.2rem;
}
.admin-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gray);
  border: 1px solid var(--border); padding: 4px 10px;
}
.btn-sm {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.68rem; letter-spacing: 0.18em;
  text-transform: uppercase; padding: 7px 16px;
  border: 1px solid var(--border); color: var(--gray);
  background: transparent; cursor: pointer;
  text-decoration: none; display: inline-block;
  transition: all .2s;
}
.btn-sm:hover { border-color: var(--gold); color: var(--gold); }
.btn-sm.gold {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--black); font-weight: 700; border-color: transparent;
}
.btn-sm.gold:hover { opacity: .88; color: var(--black); }

.admin-body {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 0;
  min-height: calc(100vh - 60px);
}

/* ── PRODUCT LIST PANEL ── */
.panel-left {
  border-right: 1px solid var(--border);
  padding: 2rem;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.8rem;
  flex-wrap: wrap; gap: 1rem;
}
.panel-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem; font-weight: 300;
}
.stats-bar {
  display: flex; gap: 1.5rem; margin-bottom: 2rem;
  flex-wrap: wrap;
}
.stat {
  background: var(--card);
  border: 1px solid var(--border);
  padding: .8rem 1.2rem;
  min-width: 100px;
}
.stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem; font-weight: 300;
  color: var(--gold);
}
.stat-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gray);
}

/* filter strip */
.filter-strip {
  display: flex; gap: .4rem; margin-bottom: 1.5rem; flex-wrap: wrap;
}
.fs-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem; letter-spacing: 0.15em;
  text-transform: uppercase; padding: 6px 14px;
  border: 1px solid var(--border); background: transparent;
  color: var(--gray); cursor: pointer; transition: all .2s;
}
.fs-btn.active, .fs-btn:hover {
  border-color: var(--gold); color: var(--gold);
  background: rgba(201,168,76,.06);
}

/* product rows */
.product-row {
  display: flex; align-items: center; gap: 1rem;
  padding: 1rem;
  background: var(--card);
  border: 1px solid transparent;
  margin-bottom: 3px;
  transition: border-color .2s;
  cursor: pointer;
}
.product-row:hover { border-color: var(--border); }
.product-row.editing { border-color: var(--gold); }

.row-thumb {
  width: 56px; height: 70px;
  background: var(--card2);
  flex-shrink: 0;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; color: var(--gray);
}
.row-thumb img {
  width: 100%; height: 100%; object-fit: cover;
}
.row-info { flex: 1; min-width: 0; }
.row-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem; font-weight: 400;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.row-meta {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--gray);
  margin-top: .2rem;
}
.row-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem; color: var(--gold);
  flex-shrink: 0;
}
.row-actions {
  display: flex; gap: .4rem; flex-shrink: 0;
}
.icon-btn {
  width: 30px; height: 30px;
  border: 1px solid var(--border); background: transparent;
  color: var(--gray); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem; transition: all .2s;
}
.icon-btn:hover { border-color: var(--gold); color: var(--gold); }
.icon-btn.del:hover { border-color: var(--red); color: var(--red); }

.empty-state {
  text-align: center; padding: 4rem 2rem;
  color: var(--gray);
}
.empty-state .big { font-size: 3rem; margin-bottom: 1rem; opacity: .3; }
.empty-state p { font-size: 0.85rem; }

/* ── FORM PANEL ── */
.panel-right {
  padding: 2rem;
  background: var(--dark);
  position: sticky; top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
}
.form-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem; font-weight: 300;
  margin-bottom: 1.8rem;
  color: var(--white);
}
.form-title span { color: var(--gold); }

.field { margin-bottom: 1.2rem; }
.field label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gray2);
  display: block; margin-bottom: .4rem;
}
.field input,
.field textarea,
.field select {
  width: 100%; padding: 10px 14px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--white); font-family: 'Barlow', sans-serif;
  font-size: 0.88rem; outline: none;
  transition: border-color .2s;
  resize: vertical;
}
.field input:focus,
.field textarea:focus,
.field select:focus { border-color: var(--gold); }
.field select option { background: var(--card); }

/* image upload */
.img-upload-area {
  border: 1px dashed var(--border);
  padding: 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s;
  position: relative;
}
.img-upload-area:hover { border-color: var(--gold); }
.img-upload-area input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width:100%; height:100%;
}
.img-preview {
  width: 100%; max-height: 180px;
  object-fit: cover; display: none;
  margin-bottom: .8rem;
}
.img-upload-icon {
  font-size: 2rem; opacity: .25; display: block; margin-bottom: .4rem;
}
.img-upload-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--gray);
}

/* ── MULTI-IMAGE GALLERY ── */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: .8rem;
}
.gallery-thumb {
  position: relative;
  aspect-ratio: 3/4;
  background: var(--card2);
  overflow: hidden;
  border: 1px solid var(--border);
}
.gallery-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.gallery-thumb .thumb-remove {
  position: absolute; top: 4px; right: 4px;
  width: 22px; height: 22px;
  background: rgba(0,0,0,.8); border: none;
  color: var(--white); font-size: .7rem;
  cursor: pointer; border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.gallery-thumb .thumb-remove:hover { background: var(--red); }
.gallery-thumb .thumb-main-badge {
  position: absolute; bottom: 4px; left: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.55rem; letter-spacing: 0.12em;
  text-transform: uppercase;
  background: var(--gold); color: var(--black);
  padding: 2px 6px; font-weight: 700;
}
.gallery-thumb .thumb-set-main {
  position: absolute; bottom: 4px; right: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.55rem; letter-spacing: 0.1em;
  text-transform: uppercase;
  background: rgba(0,0,0,.75); color: var(--gray);
  padding: 2px 6px; border: none; cursor: pointer;
  transition: color .2s;
}
.gallery-thumb .thumb-set-main:hover { color: var(--gold); }
.gallery-add {
  aspect-ratio: 3/4;
  border: 1px dashed var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  transition: border-color .2s;
  background: transparent;
}
.gallery-add:hover { border-color: var(--gold); }
.gallery-add input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width:100%; height:100%;
}
.gallery-add-icon { font-size: 1.5rem; opacity: .2; }
.gallery-add-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--gray);
  margin-top: .3rem;
}
.gallery-hint {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem; letter-spacing: 0.12em;
  color: var(--gray); margin-top: .5rem;
}

/* sizes checkboxes */
.sizes-grid {
  display: flex; flex-wrap: wrap; gap: .4rem;
}
.size-check { display: none; }
.size-check + label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem; letter-spacing: 0.12em;
  padding: 6px 13px;
  border: 1px solid var(--border); color: var(--gray);
  cursor: pointer; transition: all .2s;
}
.size-check:checked + label {
  border-color: var(--gold); color: var(--gold);
  background: rgba(201,168,76,.08);
}

/* badge select */
.badge-opts {
  display: flex; flex-wrap: wrap; gap: .4rem;
}
.badge-radio { display: none; }
.badge-radio + label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem; letter-spacing: 0.12em;
  padding: 5px 12px;
  border: 1px solid var(--border); color: var(--gray);
  cursor: pointer; transition: all .2s;
}
.badge-radio:checked + label {
  border-color: var(--gold); color: var(--gold);
  background: rgba(201,168,76,.08);
}

.form-actions {
  display: flex; gap: .6rem; margin-top: 1.8rem;
}
.btn-save {
  flex: 1; padding: 13px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--black); font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem; letter-spacing: 0.22em;
  text-transform: uppercase; font-weight: 700;
  border: none; cursor: pointer; transition: opacity .2s;
}
.btn-save:hover { opacity: .88; }
.btn-cancel {
  padding: 13px 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--gray); font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem; letter-spacing: 0.18em;
  text-transform: uppercase; cursor: pointer; transition: all .2s;
}
.btn-cancel:hover { border-color: var(--gold); color: var(--gold); }

/* toast */
.toast {
  position: fixed; bottom: 2rem; right: 2rem;
  background: var(--card); border: 1px solid var(--gold);
  padding: 1rem 1.5rem;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--gold);
  z-index: 9000;
  transform: translateY(100px); opacity: 0;
  transition: all .3s ease;
  display: flex; align-items: center; gap: .6rem;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { border-color: var(--red); color: var(--red); }

/* confirm dialog */
.confirm-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.8); z-index: 500;
  display: none; align-items: center; justify-content: center;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: var(--card); border: 1px solid var(--border);
  padding: 2rem; max-width: 340px; width: 100%; text-align: center;
  animation: fadeUp .25s ease;
}
.confirm-box h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem; margin-bottom: .8rem;
}
.confirm-box p { font-size: 0.82rem; color: var(--gray); margin-bottom: 1.8rem; }
.confirm-btns { display: flex; gap: .6rem; }
.confirm-yes {
  flex: 1; padding: 11px;
  background: var(--red); border: none;
  color: var(--white); font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem; letter-spacing: 0.18em;
  text-transform: uppercase; cursor: pointer;
}
.confirm-no {
  flex: 1; padding: 11px;
  border: 1px solid var(--border); background: transparent;
  color: var(--gray); font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem; letter-spacing: 0.18em;
  text-transform: uppercase; cursor: pointer;
  transition: all .2s;
}
.confirm-no:hover { border-color: var(--gold); color: var(--gold); }

/* animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* mobile */
@media(max-width: 900px) {
  .admin-body { grid-template-columns: 1fr; }
  .panel-right {
    position: static; height: auto;
    border-top: 1px solid var(--border);
  }
}
@media(max-width: 500px) {
  .product-row { flex-wrap: wrap; }
  .admin-nav { padding: 0 1rem; }
  .panel-left, .panel-right { padding: 1.2rem; }
}

}

/* ── FIRESTORE REALTIME ── */
function startListener() {
  db.collection(COL).orderBy('ordem', 'asc').onSnapshot(snap => {
    products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  }, err => {
    console.error(err);
    showToast('Erro ao carregar produtos.', true);
  });
}

async function saveProductToFirestore(product) {
  await db.collection(COL).doc(String(product.id)).set(product);
}

async function deleteProductFromFirestore(id) {
  await db.collection(COL).doc(String(id)).delete();
}

/* ── RENDER ── */
function renderAll() {
  renderStats();
  renderList();
}

function renderStats() {
  const cats = ['camiseta','short','moletom','conjunto','tenis','calca'];
  const counts = {};
  cats.forEach(c => counts[c] = 0);
  products.forEach(p => { if(counts[p.cat] !== undefined) counts[p.cat]++; });
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-val">${products.length}</div><div class="stat-label">Total</div></div>
    ${cats.map(c => `<div class="stat"><div class="stat-val">${counts[c]}</div><div class="stat-label">${CAT_LABEL[c]}</div></div>`).join('')}
  `;
}

function renderList() {
  const filtered = currentFilter === 'todos' ? products : products.filter(p => p.cat === currentFilter);
  const el = document.getElementById('product-list');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="big">📦</div><p>Nenhum produto nessa categoria ainda.<br>Clique em <strong>+ Novo Produto</strong> para adicionar.</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(p => `
    <div class="product-row${editingId === p.id ? ' editing' : ''}" id="row-${p.id}" onclick="editProduct(${p.id})">
      <div class="row-thumb">
        ${p.img ? `<img src="${p.img}" alt="${p.name}" />` : CAT_EMOJI[p.cat] || '📦'}
      </div>
      <div class="row-info">
        <div class="row-name">${p.name}</div>
        <div class="row-meta">${CAT_LABEL[p.cat]} · ${p.sizes.join(', ')}${p.badge ? ' · ' + p.badge : ''}</div>
      </div>
      <div class="row-price">${p.price}</div>
      <div class="row-actions" onclick="event.stopPropagation()">
        <button class="icon-btn" title="Editar" onclick="editProduct(${p.id})">✏️</button>
        <button class="icon-btn del" title="Excluir" onclick="confirmDelete(${p.id})">🗑️</button>
      </div>
    </div>
  `).join('');
}

/* ── FILTER ── */
function setFilter(btn, f) {
  document.querySelectorAll('.fs-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = f;
  renderList();
}

/* ── SIZES GRID ── */
function buildSizesGrid(cat) {
  const sizes = SIZE_MAP[cat] || SIZE_MAP['camiseta'];
  document.getElementById('sizes-grid').innerHTML = sizes.map(s => `
    <input class="size-check" type="checkbox" id="sz-${s}" value="${s}" />
    <label for="sz-${s}">${s}</label>
  `).join('');
}

document.addEventListener('change', e => {
  if (e.target.id === 'f-cat') {
    const cat = e.target.value;
    if (cat) buildSizesGrid(cat);
  }
});

function getSelectedSizes() {
  return [...document.querySelectorAll('.size-check:checked')].map(c => c.value);
}
function setSelectedSizes(sizes) {
  document.querySelectorAll('.size-check').forEach(c => {
    c.checked = sizes.includes(c.value);
  });
}

/* ── MULTI-IMAGE GALLERY ── */
let galleryImgs = []; // array of base64 strings, index 0 = main

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  const hint = document.getElementById('gallery-hint');
  let html = '';

  galleryImgs.forEach((src, i) => {
    html += `
    <div class="gallery-thumb">
      <img src="${src}" alt="foto ${i+1}" />
      <button class="thumb-remove" onclick="removeImg(${i})" title="Remover">✕</button>
      ${i === 0
        ? `<span class="thumb-main-badge">Principal</span>`
        : `<button class="thumb-set-main" onclick="setMainImg(${i})" title="Definir como principal">★ Principal</button>`
      }
    </div>`;
  });

  if (galleryImgs.length < 6) {
    html += `
    <label class="gallery-add" title="Adicionar foto">
      <input type="file" accept="image/*" multiple onchange="handleImgs(this)" />
      <span class="gallery-add-icon">＋</span>
      <span class="gallery-add-text">Adicionar</span>
    </label>`;
  }

  grid.innerHTML = html;
  hint.style.display = galleryImgs.length === 0 ? 'block' : 'none';
}

function handleImgs(input) {
  const files = [...input.files];
  const remaining = 6 - galleryImgs.length;
  const toLoad = files.slice(0, remaining);

  let loaded = 0;
  toLoad.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      galleryImgs.push(e.target.result);
      loaded++;
      if (loaded === toLoad.length) renderGallery();
    };
    reader.readAsDataURL(file);
  });

  if (files.length > remaining) {
    showToast(`Máximo 6 fotos. ${files.length - remaining} foto(s) ignorada(s).`, true);
  }
}

function removeImg(index) {
  galleryImgs.splice(index, 1);
  renderGallery();
}

function setMainImg(index) {
  const [main] = galleryImgs.splice(index, 1);
  galleryImgs.unshift(main);
  renderGallery();
}

/* ── FORM ── */
function newProduct() {
  editingId = null;
  resetForm();
  document.getElementById('form-title').innerHTML = 'Novo <span>Produto</span>';
  renderList();
  document.getElementById('f-name').focus();
}

function resetForm() {
  editingId = null;
  document.getElementById('f-name').value = '';
  document.getElementById('f-cat').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-price').value = '';
  galleryImgs = [];
  renderGallery();
  document.querySelector('input[name=badge][value=""]').checked = true;
  buildSizesGrid('camiseta');
  document.getElementById('form-title').innerHTML = 'Novo <span>Produto</span>';
  renderList();
}

function editProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('form-title').innerHTML = `Editando <span>${p.name}</span>`;
  document.getElementById('f-name').value = p.name;
  document.getElementById('f-cat').value = p.cat;
  document.getElementById('f-desc').value = p.desc;
  document.getElementById('f-price').value = p.price;

  buildSizesGrid(p.cat);
  // need small delay for DOM
  setTimeout(() => setSelectedSizes(p.sizes), 10);

  const badgeInput = document.querySelector(`input[name=badge][value="${p.badge || ''}"]`);
  if (badgeInput) badgeInput.checked = true;

  // load gallery
  galleryImgs = Array.isArray(p.imgs) ? [...p.imgs] : (p.img ? [p.img] : []);
  renderGallery();

  renderList();
  document.getElementById('panel-right') && document.querySelector('.panel-right').scrollIntoView({behavior:'smooth'});
}

async function saveProduct() {
  const name  = document.getElementById('f-name').value.trim();
  const cat   = document.getElementById('f-cat').value;
  const desc  = document.getElementById('f-desc').value.trim();
  const price = document.getElementById('f-price').value.trim();
  const sizes = getSelectedSizes();
  const badge = document.querySelector('input[name=badge]:checked')?.value || '';

  if (!name || !cat || !desc || !price) {
    showToast('Preencha todos os campos obrigatórios.', true);
    return;
  }

  const imgs = [...galleryImgs];
  const img  = imgs[0] || '';

  if (!name || !cat || !desc || !price) {
    showToast('Preencha todos os campos obrigatórios.', true);
    return;
  }

  // Generate new id if needed
  const newId = editingId
    ? editingId
    : (products.length ? String(Math.max(...products.map(p => Number(p.id)||0)) + 1) : '1');

  const existing = editingId ? products.find(x => x.id === editingId) : null;
  const ordem    = existing ? existing.ordem : (products.length + 1);

  const product = {
    id: newId, cat, name, desc, price, sizes, badge, imgs, img, ordem
  };

  try {
    await saveProductToFirestore(product);
    showToast(editingId ? '✓ Produto atualizado!' : '✓ Produto adicionado!');
    resetForm();
  } catch(e) {
    console.error(e);
    showToast('Erro ao salvar. Tente novamente.', true);
  }
}

/* ── DELETE ── */
function confirmDelete(id) {
  deleteId = id;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() {
  deleteId = null;
  document.getElementById('confirm-overlay').classList.remove('open');
}
document.getElementById('confirm-yes').onclick = async () => {
  if (deleteId) {
    try {
      await deleteProductFromFirestore(deleteId);
      if (editingId === deleteId) resetForm();
      showToast('🗑 Produto excluído.');
    } catch(e) {
      showToast('Erro ao excluir.', true);
    }
  }
  closeConfirm();
};

/* ── TOAST ── */
let toastTimer;
function showToast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' error' : '');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
